<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hypnotic Video Overlay</title>
    <style>
        :root {
            --accent-color: #00ffd5;
            --transition-speed: 2s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        /* 9:16 Mobile Container constraint for desktop viewing */
        #app-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 56.25vh; /* forces 9:16 aspect ratio roughly on landscape */
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            transition: background var(--transition-speed) ease;
        }

        /* Tap to start screen (handles audio autoplay restrictions) */
        #start-screen {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .pulse-text {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            animation: pulse-op 1.5s infinite alternate;
            color: var(--accent-color);
            transition: color var(--transition-speed);
        }

        /* Background Particles Layer */
        #particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            bottom: -10%;
            background: var(--accent-color);
            border-radius: 50%;
            opacity: 0.5;
            filter: blur(2px);
            animation: rise linear infinite;
            transition: background var(--transition-speed);
        }

        /* Central Square Area */
        .center-wrapper {
            position: relative;
            width: 80%;
            aspect-ratio: 1 / 1;
            z-index: 10;
            animation: float 6s ease-in-out infinite;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* RGB Glowing Border */
        .center-wrapper::before {
            content: "";
            position: absolute;
            inset: -4px;
            background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            background-size: 400%;
            border-radius: 12px;
            z-index: -1;
            filter: blur(8px);
            animation: rgb-glow 10s linear infinite;
            opacity: 0.85;
        }

        .image-container {
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        #main-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.5s ease;
        }

        /* Timer Overlay */
        .timer-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.2);
        }

        #progress-bar {
            height: 100%;
            width: 100%;
            background: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-color);
            transition: background var(--transition-speed);
            transform-origin: left;
        }

        #timer-text {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 5px #000, 0 0 10px var(--accent-color);
            z-index: 12;
        }

        /* Social Buttons */
        .social-actions {
            position: relative;
            z-index: 10;
            width: 80%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-top: 40px;
        }

        .btn {
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--accent-color);
            color: #fff;
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease, border-color var(--transition-speed), box-shadow var(--transition-speed);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover, .btn:active {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--accent-color);
            background: rgba(255,255,255,0.1);
        }

        .btn.sub {
            background: var(--accent-color);
            color: #000;
            font-weight: bold;
            border: none;
            box-shadow: 0 0 20px var(--accent-color);
        }

        /* Keyframe Animations */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        @keyframes rgb-glow {
            0% { background-position: 0 0; }
            50% { background-position: 400% 0; }
            100% { background-position: 0 0; }
        }

        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-120vh) scale(1.5); opacity: 0; }
        }

        @keyframes pulse-op {
            from { opacity: 0.4; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="app-container">
        
        <div id="start-screen" onclick="startExperience()">
            <div class="pulse-text">Tap to Enter</div>
        </div>

        <div id="particles"></div>

        <div class="center-wrapper">
            <div id="timer-text">30</div>
            <div class="image-container">
                <img id="main-image" src="" alt="Hypnotic Visual">
                <div class="timer-container">
                    <div id="progress-bar"></div>
                </div>
            </div>
        </div>

        <div class="social-actions">
            <button class="btn">❤️</button>
            <button class="btn">💬</button>
            <button class="btn sub">Subscribe</button>
        </div>

        <audio id="bg-music" loop>
            <source src="riddle.mp3" type="audio/mpeg">
        </audio>

    </div>

        let timeRemaining = 30;
        let isRunning = false;
        
        const imgElement = document.getElementById('main-image');
        const progressElement = document.getElementById('progress-bar');
        const timerText = document.getElementById('timer-text');
        const audio = document.getElementById('bg-music');
        const startScreen = document.getElementById('start-screen');
        const particleContainer = document.getElementById('particles');

        function startExperience() {
            if (isRunning) return;
            startScreen.style.display = 'none';
            audio.play().catch(e => console.log("Audio play prevented by browser"));
            isRunning = true;
            
            setRandomImageAndColor();
            
            // Start main loop
            setInterval(updateTimer, 1000);
            
            // Start particles
            setInterval(createParticle, 400);
        }

        function setRandomImageAndColor() {
            // Pick random image
            const randomImg = images[Math.floor(Math.random() * images.length)];
            imgElement.style.opacity = 0;
            
            setTimeout(() => {
                imgElement.src = randomImg;
                imgElement.style.opacity = 1;
            }, 500); // smooth fade

            // Generate Random Neon HSL Color
            const randomHue = Math.floor(Math.random() * 360);
            const randomColor = `hsl(${randomHue}, 100%, 50%)`;
            document.documentElement.style.setProperty('--accent-color', randomColor);
        }

        function updateTimer() {
            timeRemaining--;
            
            // Update Text
            timerText.innerText = timeRemaining;

            // Update Progress Bar
            const percentage = (timeRemaining / 30) * 100;
            progressElement.style.transform = `scaleX(${percentage / 100})`;

            if (timeRemaining <= 0) {
                timeRemaining = 30;
                setRandomImageAndColor();
            }
        }

        function createParticle() {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            
            // Randomize size, position, and speed
            const size = Math.random() * 8 + 2; 
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${Math.random() * 100}%`;
            particle.style.animationDuration = `${Math.random() * 5 + 4}s`; // 4 to 9 seconds

            particleContainer.appendChild(particle);

            // Cleanup particle after animation
            setTimeout(() => {
                particle.remove();
            }, 9000);
        }
